  <script>
    const progress = document.getElementById('progress');
    const navEl = document.querySelector('nav.top');
    const onScroll = () => {
      const h = document.documentElement;
      const max = h.scrollHeight - h.clientHeight;
      const pct = max > 0 ? (h.scrollTop || document.body.scrollTop) / max * 100 : 0;
      progress.style.width = pct + '%';
      navEl.classList.toggle('scrolled', window.scrollY > 24);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  </script>

  <script>
    (function() {
      const track = document.getElementById('stripTrack');
      const items = track.querySelectorAll('.strip-item');
      const prevBtn = document.getElementById('stripPrev');
      const nextBtn = document.getElementById('stripNext');
      const total = items.length;
      const srcs = Array.from(items).map(el => el.dataset.full || el.querySelector('img').src);
      const alts = Array.from(items).map(el => el.querySelector('img').alt);
      let offset = 0; // current translateX in px

      function itemWidth() {
        return items[0].offsetWidth + 20; // width + gap
      }
      function maxOffset() {
        const trackW = Array.from(items).reduce((s, el) => s + el.offsetWidth + 20, 0) - 20;
        const clipW = track.parentElement.offsetWidth; // .strip-clip width
        return Math.max(0, trackW - clipW);
      }

      function shiftBy(dir) {
        const step = itemWidth();
        offset = Math.max(0, Math.min(maxOffset(), offset + dir * step));
        track.style.transform = 'translateX(-' + offset + 'px)';
        prevBtn.classList.toggle('hidden', offset <= 0);
        nextBtn.classList.toggle('hidden', offset >= maxOffset());
      }

      prevBtn.addEventListener('click', () => shiftBy(-1));
      nextBtn.addEventListener('click', () => shiftBy(1));

      // Touch swipe
      let touchX = null;
      track.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, {passive: true});
      track.addEventListener('touchend', e => {
        if (touchX === null) return;
        const dx = e.changedTouches[0].clientX - touchX;
        if (Math.abs(dx) > 40) shiftBy(dx < 0 ? 1 : -1);
        touchX = null;
      }, {passive: true});

      // Lightbox
      const overlay   = document.getElementById('lbOverlay');
      const lbImg     = document.getElementById('lbImg');
      const lbInner   = document.getElementById('lbInner');
      const lbCounter = document.getElementById('lbCounter');
      const lbCloseBtn= document.getElementById('lbClose');
      const lbResetBtn= document.getElementById('lbReset');
      const lbPrev    = document.getElementById('lbPrev');
      const lbNext    = document.getElementById('lbNext');
      const lbZoomBadge = document.getElementById('lbZoomBadge');
      const lbZoomHint  = document.getElementById('lbZoomHint');
      let lbCur = 0;

      // Zoom state
      let scale = 1, panX = 0, panY = 0;
      let isDragging = false, wasDragging = false;
      let dragStartX, dragStartY, startPanX, startPanY;
      let badgeTimer = null;

      function applyTransform(animated) {
        if (animated) lbImg.style.transition = 'transform 0.2s ease';
        else lbImg.style.transition = '';
        lbImg.style.transform = scale === 1 ? '' : `translate(${panX}px,${panY}px) scale(${scale})`;
        lbImg.classList.toggle('zoomed', scale > 1);
        lbResetBtn.classList.toggle('show', scale > 1);
      }

      function showBadge() {
        if (scale === 1) { lbZoomBadge.classList.remove('show'); return; }
        lbZoomBadge.textContent = Math.round(scale * 10) / 10 + '×';
        lbZoomBadge.classList.add('show');
        clearTimeout(badgeTimer);
        badgeTimer = setTimeout(() => lbZoomBadge.classList.remove('show'), 1200);
      }

      function zoomAt(clientX, clientY, factor, animated) {
        const newScale = Math.max(1, Math.min(10, scale * factor));
        if (newScale === scale && scale === 1) return;
        const vcx = window.innerWidth / 2, vcy = window.innerHeight / 2;
        const cx = clientX - (vcx + panX);
        const cy = clientY - (vcy + panY);
        panX = panX + cx * (1 - newScale / scale);
        panY = panY + cy * (1 - newScale / scale);
        scale = newScale;
        if (scale === 1) { panX = 0; panY = 0; }
        applyTransform(animated);
        showBadge();
      }

      function resetZoom(animated) {
        scale = 1; panX = 0; panY = 0;
        applyTransform(animated);
        lbZoomBadge.classList.remove('show');
      }

      // Wheel zoom
      lbImg.addEventListener('wheel', e => {
        e.preventDefault();
        const factor = e.deltaY < 0 ? 1.18 : 1 / 1.18;
        zoomAt(e.clientX, e.clientY, factor, false);
      }, { passive: false });

      // Click to zoom
      lbImg.addEventListener('click', e => {
        e.stopPropagation();
        if (wasDragging) { wasDragging = false; return; }
        if (scale >= 8) {
          resetZoom(true);
        } else {
          zoomAt(e.clientX, e.clientY, 2, true);
        }
      });

      // Drag to pan
      lbImg.addEventListener('mousedown', e => {
        if (scale <= 1) return;
        isDragging = true; wasDragging = false;
        dragStartX = e.clientX; dragStartY = e.clientY;
        startPanX = panX; startPanY = panY;
        lbImg.classList.add('dragging');
        e.preventDefault();
      });
      window.addEventListener('mousemove', e => {
        if (!isDragging) return;
        const dx = e.clientX - dragStartX, dy = e.clientY - dragStartY;
        if (Math.abs(dx) + Math.abs(dy) > 3) wasDragging = true;
        panX = startPanX + dx; panY = startPanY + dy;
        lbImg.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;
      });
      window.addEventListener('mouseup', () => {
        if (!isDragging) return;
        isDragging = false;
        lbImg.classList.remove('dragging');
      });

      // Touch pinch zoom + drag
      let lastTouches = null, lastTouchDist = null;
      lbImg.addEventListener('touchstart', e => {
        if (e.touches.length === 2) {
          lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        }
        lastTouches = Array.from(e.touches).map(t => ({ x: t.clientX, y: t.clientY }));
        e.stopPropagation();
      }, { passive: true });
      lbImg.addEventListener('touchmove', e => {
        e.preventDefault();
        if (e.touches.length === 2 && lastTouchDist) {
          const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
          const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
          const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
          zoomAt(midX, midY, dist / lastTouchDist, false);
          lastTouchDist = dist;
        } else if (e.touches.length === 1 && scale > 1 && lastTouches) {
          const dx = e.touches[0].clientX - lastTouches[0].x;
          const dy = e.touches[0].clientY - lastTouches[0].y;
          panX += dx; panY += dy;
          lbImg.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;
          lastTouches = [{ x: e.touches[0].clientX, y: e.touches[0].clientY }];
        }
      }, { passive: false });
      lbImg.addEventListener('touchend', e => {
        if (e.touches.length < 2) lastTouchDist = null;
        if (e.touches.length === 0) lastTouches = null;
      }, { passive: true });

      function lbOpen(idx) {
        lbCur = Math.max(0, Math.min(total - 1, idx));
        resetZoom(false);
        lbImg.src = srcs[lbCur];
        lbImg.alt = alts[lbCur];
        lbCounter.textContent = (lbCur + 1) + ' / ' + total;
        lbPrev.style.visibility = lbCur === 0 ? 'hidden' : '';
        lbNext.style.visibility = lbCur === total - 1 ? 'hidden' : '';
        overlay.classList.add('open');
        document.body.style.overflow = 'hidden';
        // Show hint briefly
        lbZoomHint.style.opacity = '1';
        setTimeout(() => { lbZoomHint.style.opacity = '0'; }, 2500);
      }
      function lbClose() {
        overlay.classList.remove('open');
        document.body.style.overflow = '';
        resetZoom(false);
      }

      items.forEach((el, i) => el.addEventListener('click', () => lbOpen(i)));
      lbCloseBtn.addEventListener('click', lbClose);
      lbResetBtn.addEventListener('click', e => { e.stopPropagation(); resetZoom(true); });
      overlay.addEventListener('click', e => { if (e.target === overlay) lbClose(); });
      lbInner.addEventListener('click', e => { if (e.target === lbInner) lbClose(); });
      lbPrev.addEventListener('click', e => { e.stopPropagation(); lbOpen(lbCur - 1); });
      lbNext.addEventListener('click', e => { e.stopPropagation(); lbOpen(lbCur + 1); });

      document.addEventListener('keydown', e => {
        if (overlay.classList.contains('open')) {
          if (e.key === 'ArrowLeft' && scale === 1) lbOpen(lbCur - 1);
          else if (e.key === 'ArrowRight' && scale === 1) lbOpen(lbCur + 1);
          else if (e.key === 'Escape') { if (scale > 1) resetZoom(true); else lbClose(); }
          else if (e.key === '+' || e.key === '=') zoomAt(window.innerWidth/2, window.innerHeight/2, 1.5, true);
          else if (e.key === '-') zoomAt(window.innerWidth/2, window.innerHeight/2, 1/1.5, true);
        } else {
          if (e.key === 'ArrowLeft') shiftBy(-1);
          else if (e.key === 'ArrowRight') shiftBy(1);
        }
      });
    })();
  </script>
</body>
</html>
